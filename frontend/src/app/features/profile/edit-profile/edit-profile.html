<app-nav-bar></app-nav-bar>

<div class="mw-page">
  <div class="mw-topbar">
    <h1 class="mw-h1">Edit profile</h1>
	<div class="mw-actions">
		<a routerLink="/profile" class="mw-chip">Back</a>
	</div>
  </div>

  <div *ngIf="error" class="mw-alert mw-alert--error" style="margin-top: 10px">{{ error }}</div>
  <div *ngIf="success" class="mw-alert mw-alert--success" style="margin-top: 10px">{{ success }}</div>

  <div class="mw-panel" style="margin-top: 12px">
    <div style="font-weight: 800; margin-bottom: 10px;">Personal details</div>
	<div class="mw-form">
      <div class="mw-field">
        <label class="mw-label" for="displayName">Name</label>
        <input id="displayName" class="mw-input" [(ngModel)]="displayName" placeholder="Your name" />
      </div>

      <div class="mw-field">
        <label class="mw-label" for="phone">Phone</label>
        <input id="phone" class="mw-input" [(ngModel)]="phone" placeholder="Optional" />
      </div>

      <div class="mw-field">
        <label class="mw-label" for="bio">Bio</label>
        <textarea id="bio" class="mw-input" [(ngModel)]="bio" placeholder="Tell us about yourself" rows="3"></textarea>
      </div>

      <div class="mw-field">
        <label class="mw-label" for="city">City</label>
        <input id="city" class="mw-input" [(ngModel)]="city" placeholder="Your city" />
      </div>

      <div class="mw-field">
        <label class="mw-label" for="governorate">Governorate</label>
        <input id="governorate" class="mw-input" [(ngModel)]="governorate" placeholder="Your governorate" />
      </div>

      <div class="mw-field">
        <label class="mw-label" for="avatarUrl">Avatar URL</label>
        <input id="avatarUrl" class="mw-input" [(ngModel)]="avatarUrl" placeholder="https://..." />
      </div>

      <button class="mw-btn mw-btn--primary" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving…' : 'Save changes' }}
      </button>
    </div>
  </div>

  <div class="mw-panel" style="margin-top: 12px">
    <div style="font-weight: 800; margin-bottom: 10px;">Account & security</div>

    <div class="mw-form">
      <div class="mw-field">
        <label class="mw-label" for="email">Email</label>
        <input id="email" class="mw-input" [(ngModel)]="newEmail" placeholder="Email" />
      </div>

      <button class="mw-btn mw-btn--primary" (click)="changeEmail()" [disabled]="changingEmail">
        {{ changingEmail ? 'Updating…' : 'Change email' }}
      </button>

      <div class="mw-field" style="margin-top: 10px;">
        <label class="mw-label" for="newPassword">New password</label>
        <input id="newPassword" type="password" class="mw-input" [(ngModel)]="newPassword" placeholder="New password" />
      </div>

      <div class="mw-field">
        <label class="mw-label" for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" class="mw-input" [(ngModel)]="confirmPassword" placeholder="Confirm password" />
      </div>

      <button class="mw-btn mw-btn--primary" (click)="changePassword()" [disabled]="changingPassword">
        {{ changingPassword ? 'Updating…' : 'Change password' }}
      </button>

      <button class="mw-btn" style="margin-top: 8px;" (click)="sendPasswordReset()" [disabled]="sendingReset">
        {{ sendingReset ? 'Sending…' : 'Send reset email' }}
      </button>
    </div>
  </div>
</div>
