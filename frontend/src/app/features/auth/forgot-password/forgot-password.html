<div class="mw-shell">
  <div class="mw-card">
    <header class="mw-header">
      <h1 class="mw-brand">Reset password</h1>
      <p class="mw-tagline">We’ll email you a reset link</p>
    </header>

    <div *ngIf="error" class="mw-alert mw-alert--error">{{ error }}</div>
    <div *ngIf="success" class="mw-alert mw-alert--success">{{ success }}</div>

    <div class="mw-form" style="margin-top: 12px">
      <div class="mw-field">
        <label class="mw-label" for="email">Email</label>
        <input id="email" class="mw-input" [(ngModel)]="email" type="email" placeholder="you@email.com" />
      </div>

      <button class="mw-btn mw-btn--primary" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Sending…' : 'Send reset link' }}
      </button>

      <div class="mw-links" style="justify-content: center">
        <a routerLink="/login">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
